[bltouch]
sensor_pin: ^P0.10
control_pin: P2.0
x_offset: 0
y_offset: -16
# x_offset: 50
# y_offset: 14
# z_offset: 1.43000
z_offset: 1.5500
# z_offset: 1.4100
# z_offset: 1.3330
# z_offset: 1.1800


[bed_mesh]
probe_count: 5,5
fade_start: 0.6
fade_end: 4
fade_target: 0.0
split_delta_z: .025
move_check_distance: 5.0
mesh_pps: 2,2
algorithm: bicubic


speed: 150
mesh_min: 2, -13
mesh_max: 230, 199
mesh_pps: 3, 3
bicubic_tension: 0.2
adaptive_margin: 5
horizontal_move_z: 5